<body style="font-family:Arial;background:#111;color:white;text-align:center;padding:20px;">

 <div class="box">
  <h1>IVY PEPTIDES</h1>
<h2>Crypto Checkout (ETH)</h2>

  <p><b>Wallet Address:</b></p>
  <div id="wallet" style="background:#333;padding:12px;border-radius:6px;word-break:break-all;">
    0xD5a0E7c34ad05b52906a2e0B7103b62fE77eE624
  </div>

  <button onclick="copyWallet()">Copy Wallet</button>

<img
  src="https://quickchart.io/qr?text=0xD5a0E7c34ad05b52906a2e0B7103b62fE77eE624&size=220"
  alt="QR Code"
  style="margin:15px auto;display:block;background:white;padding:10px;border-radius:8px;"
>

  
  <label>Choose product:</label>

  <select id="product" 
 onchange="updateTotal()">
  <option value="">Loading products...</
  option>
</select>

  <br><br>

  <label>Quantity:</label>
  <input type="number" id="quantity" value="1" min="1" oninput="updateTotal()">

  <p>Express Post: €10.00</p>
  <p>Crypto Handling Fee: €5.00</p>
  <h3>Total: €<span id="total">55.00</span></h3>

  <p>ETH Amount: <span id="ethAmount">Calculating...</span></p>

  <button onclick="copyEthAmount()">Copy ETH Amount</button>
  <button onclick="openMoonPay()">Buy ETH with MoonPay</button>

  <br><br>

  <input type="email" id="email" placeholder="Customer email">
  <input type="text" id="txid" placeholder="Transaction hash">

  <button onclick="submitOrder()">Submit Order</button>

  <p id="status"></p>
</div>

<script>
const WALLET = "...";
const DELIVERY_FEE = 10;
const CRYPTO_FEE = 5;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0ExRI3CMthaZR9KD9z3_e2xAErssndaCtEDjx0D_yupYvN8VHvAVszTvgiYWoNQLo/exec";

let currentEthAmount = "";
async function loadProducts() {
  const response = await fetch(SCRIPT_URL + "?action=products");
  const products = await response.json();

  const productSelect = document.getElementById("product");
  productSelect.innerHTML = "";

  products.forEach(product => {
    const option = document.createElement("option");
    option.value = product.price;
    option.setAttribute("data-stock", product.stock);
    option.textContent =
async function updateTotal() {
  const productSelect = document.getElementById("product");
  const price = Number(productSelect.value);
  let quantity = Number(document.getElementById("quantity").value) || 1;

  const selectedOption = productSelect.options[productSelect.selectedIndex];
  const stock = Number(selectedOption.getAttribute("data-stock")) || 999;

  document.getElementById("quantity").max = stock;

  if (quantity > stock) {
    alert("Only " + stock + " items are in stock.");
    quantity = stock;
    document.getElementById("quantity").value = stock;
  }

  const total = (price * quantity) + DELIVERY_FEE + CRYPTO_FEE;
  document.getElementById("total").innerText = total.toFixed(2);

  try {
    const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=eur");
    const data = await response.json();
    const ethRate = data.ethereum.eur;

    currentEthAmount = (total / ethRate).toFixed(6);
    document.getElementById("ethAmount").innerText = currentEthAmount + " ETH";
  } catch (error) {
    document.getElementById("ethAmount").innerText = "Rate unavailable";
  }

}
function copyWallet() {
  navigator.clipboard.writeText(WALLET);
  document.getElementById("status").innerText = "Wallet copied.";
}

function copyEthAmount() {
  navigator.clipboard.writeText(currentEthAmount);
  document.getElementById("status").innerText = "ETH amount copied.";
}

function openMoonPay() {
  const total = document.getElementById("total").innerText;
  const url =
    "https://buy.moonpay.com/?currencyCode=eth" +
    "&baseCurrencyCode=eur" +
    "&baseCurrencyAmount=" + encodeURIComponent(total) +
    "&walletAddress=" + encodeURIComponent(WALLET);

  window.location.href = url;
}

async function submitOrder() {
  const product = document.getElementById("product").selectedOptions[0].text;
  const quantity = document.getElementById("quantity").value;
  const total = document.getElementById("total").innerText;
  const email = document.getElementById("email").value;
  const txid = document.getElementById("txid").value;

  if (!email || !txid) {
    alert("Please enter your email and transaction ID.");
    return;
  }

  document.getElementById("status").innerText = "Submitting order...";

  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        product,
        quantity,
        total,
        email,
        txid,
        wallet: WALLET,
        ethAmount: currentEthAmount
      })
    });

    const result = await response.json();

    document.getElementById("status").innerText =
      result.message || "Order submitted successfully!";
  } catch (err) {
    document.getElementById("status").innerText =
      "Error submitting order.";
  }
}

loadProducts();
</script>

</body>
</html>
