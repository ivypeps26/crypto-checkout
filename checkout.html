<!DOCTYPE html>
<html>
<head>
  <title>Generic Crypto Checkout Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#111;color:white;text-align:center;padding:20px;">

<div style="background:#222;max-width:430px;margin:auto;padding:20px;border-radius:12px;">
  <h2>Generic Crypto Checkout Demo</h2>

  <p><b>Wallet Address:</b></p>
  <div id="wallet" style="background:#333;padding:12px;border-radius:6px;word-break:break-all;">
    0xD5a0E7c34ad05b52906a2e0B7103b62fE77eE624
  </div>

  <button onclick="copyWallet()">Copy Wallet</button>

  <img 
    src="https://quickchart.io/qr?text=0xD5a0E7c34ad05b52906a2e0B7103b62fE77eE624&size=220" 
    alt="QR Code"
    style="margin:15px auto;display:block;background:white;padding:10px;border-radius:8px;"
  >

  <label>Choose product:</label>
  <select id="product" onchange="updateTotal()">
    <option value="40">Demo Product A - €40</option>
    <option value="70">Demo Product B - €70</option>
    <option value="25">Demo Product C - €25</option>
  </select>

  <br><br>

  <label>Quantity:</label>
  <input type="number" id="quantity" value="1" min="1" oninput="updateTotal()">

  <p>Express Post: €10.00</p>
  <p>Crypto Handling Fee: €5.00</p>
  <h3>Total: €<span id="total">55.00</span></h3>

  <p>ETH Amount: <span id="ethAmount">Calculating...</span></p>

  <button onclick="copyEthAmount()">Copy ETH Amount</button>
  <button onclick="openMoonPay()">Buy ETH with MoonPay</button>

  <br><br>

  <input type="email" id="email" placeholder="Customer email">
  <input type="text" id="txid" placeholder="Transaction hash">

  <button onclick="submitOrder()">Submit Order</button>

  <p id="status"></p>
</div>

<script>
const WALLET = "0xD5a0E7c34ad05b52906a2e0B7103b62fE77eE624";
const DELIVERY_FEE = 10;
const CRYPTO_FEE = 5;

let currentEthAmount = "";

async function updateTotal() {
  const price = Number(document.getElementById("product").value);
  const quantity = Number(document.getElementById("quantity").value) || 1;
  const total = (price * quantity) + DELIVERY_FEE + CRYPTO_FEE;

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("ethAmount").innerText = "Calculating...";

  try {
    const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=eur");
    const data = await response.json();
    const ethRate = data.ethereum.eur;

    currentEthAmount = (total / ethRate).toFixed(6);
    document.getElementById("ethAmount").innerText = currentEthAmount + " ETH";
  } catch (error) {
    document.getElementById("ethAmount").innerText = "Rate unavailable";
  }
}

function copyWallet() {
  navigator.clipboard.writeText(WALLET);
  document.getElementById("status").innerText = "Wallet copied.";
}

function copyEthAmount() {
  navigator.clipboard.writeText(currentEthAmount);
  document.getElementById("status").innerText = "ETH amount copied.";
}

function openMoonPay() {
  const total = document.getElementById("total").innerText;
  const url =
    "https://buy.moonpay.com/?currencyCode=eth" +
    "&baseCurrencyCode=eur" +
    "&baseCurrencyAmount=" + encodeURIComponent(total) +
    "&walletAddress=" + encodeURIComponent(WALLET);

  window.location.href = url;
}

function submitOrder() {
  document.getElementById("status").innerText = "Order submitted.";
}

updateTotal();
</script>

</body>
</html>
